<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>カウンター</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg-secondary: #f5f5f3;
      --bg-info: #e6f1fb;
      --text: #1a1a18;
      --text-secondary: #6b6b68;
      --text-info: #185fa5;
      --border: rgba(0,0,0,0.12);
      --border-hover: rgba(0,0,0,0.25);
      --radius-md: 8px;
      --radius-lg: 12px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1c;
        --bg-secondary: #2a2a27;
        --bg-info: #0c2e4a;
        --text: #f0ede8;
        --text-secondary: #9a9893;
        --text-info: #85b7eb;
        --border: rgba(255,255,255,0.12);
        --border-hover: rgba(255,255,255,0.25);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: var(--bg-secondary);
      color: var(--text);
      min-height: 100dvh;
    }

    /* ─── 固定ヘッダー ─── */
    .sticky-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      border-bottom: 0.5px solid var(--border);
      padding: 14px 16px 12px;
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    .sticky-header h1 {
      font-size: 13px;
      font-weight: 400;
      color: var(--text-secondary);
      flex-shrink: 0;
    }
    .total-num {
      font-size: 30px;
      font-weight: 500;
      color: var(--text);
      line-height: 1;
      flex: 1;
    }
    .unit {
      font-size: 14px;
      color: var(--text-secondary);
      flex-shrink: 0;
    }
    .reset-btn {
      font-size: 12px;
      padding: 5px 14px;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--border-hover);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .reset-btn:active { background: var(--bg-secondary); }

    /* ─── スロット一覧 ─── */
    .slots-wrap {
      padding: 14px 12px 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 480px;
      margin: 0 auto;
    }

    .slot-card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 12px 14px 14px;
    }

    .slot-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .slot-name { font-size: 12px; color: var(--text-secondary); flex: 1; }
    .slot-value { font-size: 20px; font-weight: 500; color: var(--text); min-width: 28px; text-align: right; }
    .slot-unit { font-size: 12px; color: var(--text-secondary); }

    /* ─── メモ欄 ─── */
    .memo-input {
      width: 100%;
      font-size: 16px;
      padding: 7px 10px;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--border);
      background: var(--bg-secondary);
      color: var(--text);
      font-family: inherit;
      margin-bottom: 10px;
      resize: none;
      line-height: 1.4;
    }
    .memo-input::placeholder { color: var(--text-secondary); }
    .memo-input:focus { outline: none; border-color: var(--text-info); background: var(--bg); }

    .btn-row {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 6px;
      margin-bottom: 8px;
    }
    .count-btn {
      padding: 10px 4px;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--border-hover);
      background: transparent;
      color: var(--text);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s, transform 0.1s;
    }
    .count-btn:active { transform: scale(0.94); }
    .count-btn.selected {
      background: var(--bg-info);
      color: var(--text-info);
      border-color: transparent;
    }

    .free-row { display: flex; align-items: center; gap: 8px; }
    .free-label { font-size: 12px; color: var(--text-secondary); flex-shrink: 0; }
    .free-input {
      width: 68px;
      font-size: 16px;
      padding: 7px 8px;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--border-hover);
      background: transparent;
      color: var(--text);
      text-align: center;
      font-family: inherit;
    }
    .free-input:focus { outline: none; border-color: var(--text-info); }
    .free-set-btn {
      padding: 8px 16px;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--border-hover);
      background: transparent;
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }
    .free-set-btn:active { background: var(--bg-secondary); }

    /* ─── 枠追加ボタン ─── */
    .add-slot-wrap {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 12px 48px;
    }
    .add-slot-btn {
      display: block;
      width: 100%;
      padding: 10px;
      border-radius: var(--radius-lg);
      border: 1px dashed var(--border-hover);
      background: transparent;
      color: var(--text-secondary);
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }
    .add-slot-btn:active { background: var(--bg-secondary); }
  </style>
</head>
<body>

  <div class="sticky-header">
    <h1>合計</h1>
    <span class="total-num" id="grand-total">0</span>
    <span class="unit">回</span>
    <button class="reset-btn" id="reset-btn">リセット</button>
  </div>

  <div class="slots-wrap" id="slots-wrap"></div>
  <div class="add-slot-wrap"><button class="add-slot-btn" id="add-slot-btn" onclick="addSlot()">＋ 枠を追加</button></div>

  <script>
    const PRESETS = [1, 2, 3, 4, 5];
    const NUM_SLOTS = 10;
    const STORAGE_KEY = 'counter_values_v1';
    const MEMO_KEY    = 'counter_memos_v1';

    // 数値の保存・読み込み
    function loadValues() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const parsed = JSON.parse(raw);
          if (Array.isArray(parsed) && parsed.length >= 1) return parsed;
        }
      } catch (e) {}
      return new Array(NUM_SLOTS).fill(0);
    }
    function saveValues() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(values)); } catch (e) {}
    }

    // メモの保存・読み込み
    function loadMemos() {
      try {
        const raw = localStorage.getItem(MEMO_KEY);
        if (raw) {
          const parsed = JSON.parse(raw);
          if (Array.isArray(parsed) && parsed.length === NUM_SLOTS) return parsed;
        }
      } catch (e) {}
      return new Array(NUM_SLOTS).fill('');
    }
    function saveMemos() {
      try { localStorage.setItem(MEMO_KEY, JSON.stringify(memos)); } catch (e) {}
    }

    const values = loadValues();
    const memos  = loadMemos();

    function updateTotal() {
      document.getElementById('grand-total').textContent =
        values.reduce((a, b) => a + b, 0);
    }

    function setSlot(i, val, btnIdx) {
      values[i] = val;
      document.getElementById('slot-val-' + i).textContent = val;
      document.querySelectorAll('#slot-' + i + ' .count-btn')
        .forEach((b, idx) => b.classList.toggle('selected', idx === btnIdx));
      saveValues();
      updateTotal();
    }

    // スロット生成
    const wrap = document.getElementById('slots-wrap');
    for (let i = 0; i < NUM_SLOTS; i++) {
      const card = document.createElement('div');
      card.className = 'slot-card';
      card.id = 'slot-' + i;

      // ── ヘッダー（枠名 + 回数）
      const header = document.createElement('div');
      header.className = 'slot-header';
      header.innerHTML =
        '<span class="slot-name">枠 ' + (i + 1) + '</span>' +
        '<span class="slot-value" id="slot-val-' + i + '">' + values[i] + '</span>' +
        '<span class="slot-unit">回</span>';

      // ── メモ欄
      const memo = document.createElement('textarea');
      memo.className = 'memo-input';
      memo.id = 'memo-' + i;
      memo.placeholder = 'メモ（全角10文字程度）';
      memo.maxLength = 20;          // 全角10文字 ≒ バイト数20で制限
      memo.rows = 1;
      memo.value = memos[i];
      memo.addEventListener('input', () => {
        memos[i] = memo.value;
        saveMemos();
      });

      // ── プリセットボタン
      const btnRow = document.createElement('div');
      btnRow.className = 'btn-row';
      PRESETS.forEach((n, idx) => {
        const btn = document.createElement('button');
        btn.className = 'count-btn';
        btn.textContent = n + '回';
        if (values[i] === n) btn.classList.add('selected');
        btn.addEventListener('click', () => {
          if (btn.classList.contains('selected')) {
            btn.classList.remove('selected');
            values[i] = 0;
            document.getElementById('slot-val-' + i).textContent = '0';
            document.getElementById('free-inp-' + i).value = '';
            saveValues();
            updateTotal();
          } else {
            document.getElementById('free-inp-' + i).value = '';
            setSlot(i, n, idx);
          }
        });
        btnRow.appendChild(btn);
      });

      // ── フリー入力
      const freeRow = document.createElement('div');
      freeRow.className = 'free-row';

      const freeLabel = document.createElement('span');
      freeLabel.className = 'free-label';
      freeLabel.textContent = 'フリー入力';

      const freeInput = document.createElement('input');
      freeInput.type = 'number';
      freeInput.min = '0';
      freeInput.id = 'free-inp-' + i;
      freeInput.className = 'free-input';
      freeInput.placeholder = '0';
      freeInput.inputMode = 'numeric';
      if (values[i] > 0 && !PRESETS.includes(values[i])) {
        freeInput.value = values[i];
      }

      const freeBtn = document.createElement('button');
      freeBtn.className = 'free-set-btn';
      freeBtn.textContent = 'セット';
      freeBtn.addEventListener('click', () => {
        const v = parseInt(freeInput.value, 10) || 0;
        document.querySelectorAll('#slot-' + i + ' .count-btn')
          .forEach(b => b.classList.remove('selected'));
        setSlot(i, v, null);
      });

      freeRow.appendChild(freeLabel);
      freeRow.appendChild(freeInput);
      freeRow.appendChild(freeBtn);

      card.appendChild(header);
      card.appendChild(memo);      // ヘッダーの直下にメモ欄
      card.appendChild(btnRow);
      card.appendChild(freeRow);
      wrap.appendChild(card);
    }

    updateTotal();

    // リセット（回数＋メモをすべてリセット）
    document.getElementById('reset-btn').addEventListener('click', () => {
      if (!confirm('回数とメモをすべてリセットしますか？')) return;
      const total = values.length;
      values.fill(0);
      memos.fill('');
      for (let i = 0; i < total; i++) {
        const slotVal = document.getElementById('slot-val-' + i);
        if (slotVal) slotVal.textContent = '0';
        document.querySelectorAll('#slot-' + i + ' .count-btn')
          .forEach(b => b.classList.remove('selected'));
        const fi = document.getElementById('free-inp-' + i);
        if (fi) fi.value = '';
        const mi = document.getElementById('memo-' + i);
        if (mi) mi.value = '';
      }
      saveValues();
      saveMemos();
      updateTotal();
    });

    // 枠を追加する関数
    function addSlot() {
      const i = values.length;
      values.push(0);
      memos.push('');
      saveValues();
      saveMemos();

      const card = document.createElement('div');
      card.className = 'slot-card';
      card.id = 'slot-' + i;

      const header = document.createElement('div');
      header.className = 'slot-header';
      header.innerHTML =
        '<span class="slot-name">枠 ' + (i + 1) + '</span>' +
        '<span class="slot-value" id="slot-val-' + i + '">0</span>' +
        '<span class="slot-unit">回</span>';

      const memo = document.createElement('textarea');
      memo.className = 'memo-input';
      memo.id = 'memo-' + i;
      memo.placeholder = 'メモ（全角10文字程度）';
      memo.maxLength = 20;
      memo.rows = 1;
      memo.value = '';
      memo.addEventListener('input', () => { memos[i] = memo.value; saveMemos(); });

      const btnRow = document.createElement('div');
      btnRow.className = 'btn-row';
      PRESETS.forEach((n, idx) => {
        const btn = document.createElement('button');
        btn.className = 'count-btn';
        btn.textContent = n + '回';
        btn.addEventListener('click', () => {
          if (btn.classList.contains('selected')) {
            btn.classList.remove('selected');
            values[i] = 0;
            document.getElementById('slot-val-' + i).textContent = '0';
            document.getElementById('free-inp-' + i).value = '';
            saveValues();
            updateTotal();
          } else {
            document.getElementById('free-inp-' + i).value = '';
            setSlot(i, n, idx);
          }
        });
        btnRow.appendChild(btn);
      });

      const freeRow = document.createElement('div');
      freeRow.className = 'free-row';
      const freeLabel = document.createElement('span');
      freeLabel.className = 'free-label';
      freeLabel.textContent = 'フリー入力';
      const freeInput = document.createElement('input');
      freeInput.type = 'number';
      freeInput.min = '0';
      freeInput.id = 'free-inp-' + i;
      freeInput.className = 'free-input';
      freeInput.placeholder = '0';
      freeInput.inputMode = 'numeric';
      const freeBtn = document.createElement('button');
      freeBtn.className = 'free-set-btn';
      freeBtn.textContent = 'セット';
      freeBtn.addEventListener('click', () => {
        const v = parseInt(freeInput.value, 10) || 0;
        document.querySelectorAll('#slot-' + i + ' .count-btn')
          .forEach(b => b.classList.remove('selected'));
        setSlot(i, v, null);
      });
      freeRow.appendChild(freeLabel);
      freeRow.appendChild(freeInput);
      freeRow.appendChild(freeBtn);

      card.appendChild(header);
      card.appendChild(memo);
      card.appendChild(btnRow);
      card.appendChild(freeRow);

      // 追加ボタンの直前に挿入
      wrap.insertBefore(card, document.getElementById('add-slot-btn').parentNode);
    }
  </script>
</body>
</html>
